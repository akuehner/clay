name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # No npm install — checks only need the standard library.

      - name: Verify client ES module imports resolve
        run: node scripts/check-client-imports.js

      - name: Syntax check server-side JS (CommonJS)
        run: |
          # Server-side .js is CommonJS in this project (no "type" in
          # package.json). `node --check` parses without executing.
          # Excludes lib/public (client ES modules — different parse mode,
          # covered by the import-resolution check above).
          set -e
          fail=0
          while IFS= read -r f; do
            if ! node --check "$f"; then
              echo "Syntax error in: $f" >&2
              fail=1
            fi
          done < <(find bin lib -name '*.js' -not -path 'lib/public/*')
          exit $fail

      - name: Syntax check client-side JS (ES modules)
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! node --check --input-type=module < "$f" >/dev/null 2>&1; then
              # Re-run without redirect to surface the error.
              echo "Syntax error in: $f" >&2
              node --check --input-type=module < "$f" || true
              fail=1
            fi
          done < <(find lib/public -name '*.js')
          exit $fail
